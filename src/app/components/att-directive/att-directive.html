<div class="row">
    <div class="col-3">
        <div class="p-3" [ngClass]="bgClassName()">
            DIV 1 {{bgClassName()}}
        </div>
        
    </div>
    <div class="col-3">
        <div class="p-3" [ngStyle]="{'background-color':isDiv2Green==true ? 'blue':'red'}">
            DIV 2
        </div>
    </div>
</div>
<div class="row">
    <div class="col-3">
        <button class="btn btn-success" (click)="setbgclass('bg-success')">Green</button>
        <button class="btn btn-danger" (click)="setbgclass('bg-danger')">Red</button>
    </div>
    <div class="col-3">
        <button class="btn btn-success" (click)="toggleDiv2Color()">Green</button>
    </div>
</div>
